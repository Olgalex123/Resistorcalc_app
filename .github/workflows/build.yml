name: Build APK
on: [push, workflow_dispatch]

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer global deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1  # ✅ Патченный образ
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable
          command: buildozer android release
        env:
          APP_ANDROID_ARCH: arm64-v8a
          APP_ANDROID_API: 33
          APP_ANDROID_NDK: 25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: ${{ steps.buildozer.outputs.filename }}
