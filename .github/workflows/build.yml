name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Create user (fix chown error)
        run: |
          sudo useradd -m user || true
          sudo chown -R user:user .buildozer 2>/dev/null || true

      - name: Build with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable
          command: buildozer -y android release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
          if-no-files-found: error
