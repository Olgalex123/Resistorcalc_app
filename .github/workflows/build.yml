name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Build Cache (критично при смене версии!)
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf .buildozer/android/packages

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Build APK
        uses: addnab/docker-run-action@v3
        with:
          image: kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/app -w /app -i
          run: |
            echo "=== PATCHING ROOT CHECK ==="
            BUILD_FILE=$(find /home/user/.venv -name "__init__.py" -path "*/buildozer/__init__.py" 2>/dev/null | head -1)
            if [ -n "$BUILD_FILE" ]; then
              sed -i 's/cont = input.*/cont = "y"/' "$BUILD_FILE"
              echo "Patched: $BUILD_FILE"
            fi
            
            echo "=== CREATING PYTHON3.11 SYMLINK ==="
            ln -sf $(which python3) /usr/bin/python3.11
            ls -la /usr/bin/python3.11 || true
            
            echo "=== STARTING BUILD ==="
            buildozer -y android release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
          if-no-files-found: error
