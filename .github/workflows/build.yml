name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk zip unzip autoconf automake libtool pkg-config

      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython buildozer "kivy==2.3.0" "kivymd==1.2.0"
          # ✅ Используем master ветку (работает)
          pip install "git+https://github.com/kivy/python-for-android.git@master"

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: resistorcalc-apk, path: bin/*.apk }
