name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk zip unzip autoconf automake libtool pkg-config

      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "cython<3.1.0"
          pip install buildozer
          pip install "kivy==2.3.0"
          pip install "kivymd==1.2.0"
          pip install "git+https://github.com/kivy/pyjnius.git@master"
          pip install "git+https://github.com/kivy/python-for-android.git@master"

      - name: Patch python3 recipe to skip test compilation
        run: |
          # Найти рецепт python3 и отключить компиляцию тестов
          RECIPE=$(find ~/.buildozer/android/platform/python-for-android -name "__init__.py" -path "*/recipes/python3/*" 2>/dev/null | head -1)
          if [ -n "$RECIPE" ]; then
            # Добавить флаг, чтобы игнорировать ошибки компиляции тестов
            sed -i 's/\.pyc")/\.pyc", ignore_errors=True)/g' "$RECIPE" 2>/dev/null || true
            # Или просто пропустить компиляцию папок test/
            sed -i 's/for root, dirs, files/for root, dirs, files in os.walk(arch.get_python_dir()):\n            if "test" in root or "tests" in root: continue\n        for root, dirs, files/g' "$RECIPE" 2>/dev/null || true
          fi
          echo "✅ Patch applied (if recipe found)"

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          # Добавить флаг игнорирования ошибок компиляции
          buildozer -v android debug --ignore-compilation-errors || \
          buildozer -v android debug  # Повтор без флага, если первый упал

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: resistorcalc-apk, path: bin/*.apk }
