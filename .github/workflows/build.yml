name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer global dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Build APK (non-root)
        run: |
          docker run --rm \
            --user 1000:1000 \
            -v ${PWD}:/app \
            -w /app \
            kivy/buildozer:latest \
            buildozer android release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
          if-no-files-found: error
