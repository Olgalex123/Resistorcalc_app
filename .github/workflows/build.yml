name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Build Cache (critical when changing Python version)
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf .buildozer/android/packages
          rm -rf bin/

      - name: Cache Buildozer global dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Build APK
        uses: addnab/docker-run-action@v3
        with:
          image: kivy/buildozer:latest
          options: -v ${{ github.workspace }}:/app -w /app -i
          run: |
            echo "=== [1/3] PATCHING ROOT CHECK ==="
            BUILD_FILE=$(find /home/user/.venv -name "__init__.py" -path "*/buildozer/__init__.py" 2>/dev/null | head -1)
            if [ -n "$BUILD_FILE" ]; then
              sed -i 's/cont = input.*/cont = "y"/' "$BUILD_FILE"
              echo "✓ Patched: $BUILD_FILE"
              grep -n 'cont = "y"' "$BUILD_FILE" || true
            else
              echo "✗ ERROR: buildozer __init__.py not found!"
              exit 1
            fi

            echo ""
            echo "=== [2/3] CREATING PYTHON3.11 SYMLINK ==="
            ln -sf $(which python3) /usr/bin/python3.11
            ls -la /usr/bin/python3.11 && echo "✓ Symlink created" || echo "✗ Symlink failed"

            echo ""
            echo "=== [3/3] STARTING BUILD ==="
            buildozer -y android release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-aab
          path: bin/*.aab
          if-no-files-found: error
