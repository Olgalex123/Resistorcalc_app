name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:ф
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk zip unzip autoconf automake libtool pkg-config

      - name: Increase swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Python dependencies (TESTED COMBO)
        run: |
          pip install --upgrade pip
          
          # ✅ Cython 0.29.x (максимально совместимая версия)
          pip install "cython==0.29.37"
          
          # ✅ buildozer 1.4.0 (стабильная версия)
          pip install "buildozer==1.4.0"
          
          # ✅ Kivy 2.2.0 (более стабильная чем 2.3.0)
          pip install "kivy==2.2.0"
          
          # ✅ KivyMD 1.1.1 (стабильная версия)
          pip install "kivymd==1.1.1"
          
          # ✅ python-for-android 2023.10.28 (стабильный тег)
          pip install "git+https://github.com/kivy/python-for-android.git@v2023.10.28"

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: { name: resistorcalc-apk, path: bin/*.apk }
