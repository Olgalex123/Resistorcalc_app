name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Build APK (with debug + stdin)
        run: |
          printf 'y\n' | docker run --rm -i \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            bash -c '
              echo "=== DEBUG: Finding buildozer file ==="
              find /home/user/.venv -name "__init__.py" -path "*/buildozer/__init__.py" 2>/dev/null
              echo "=== DEBUG: Patching ==="
              for f in $(find /home/user/.venv -name "__init__.py" -path "*/buildozer/__init__.py" 2>/dev/null); do
                echo "Patching: $f"
                sed -i '"'"'s/cont = input.*/cont = "y"/'"'"' "$f"
                echo "After patch:"
                grep -n "cont = " "$f" || echo "NOT FOUND"
              done
              echo "=== DEBUG: Starting buildozer ==="
              buildozer android release
            '

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
          if-no-files-found: error
