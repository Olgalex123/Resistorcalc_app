name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk zip unzip
          sudo apt install -y autoconf automake libtool ninja-build

      - name: Increase swap space (fix OOM)
        run: |
          sudo swapoff -a
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython buildozer "kivy==2.3.0" "kivymd==1.2.0"
          pip install --upgrade "https://github.com/kivy/python-for-android/archive/master.zip"

      - name: Fix libffi build (patch autoconf macros)
        run: |
          # Скопировать правильные макросы libtool
          mkdir -p /usr/share/aclocal
          wget -q https://raw.githubusercontent.com/libffi/libffi/master/libtool.m4 -O /usr/share/aclocal/libtool.m4 || true

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
