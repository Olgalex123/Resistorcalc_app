name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-deps-

      - name: Build APK (patch + build in one container)
        run: |
          docker run --rm -v ${PWD}:/app -w /app \
            kivy/buildozer:latest \
            sh -c "sed -i 's/cont = input.*/cont = \"y\"/' /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py && buildozer android release"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resistorcalc-apk
          path: bin/*.apk
          if-no-files-found: error
